<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}用户管理系统{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">用户管理系统</div>
        <div class="nav-menu">
            {% if session.get('username') %}
                {% if session.get('avatar') %}
                <img src="{{ session['avatar'] }}" alt="头像" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.6);">
                {% endif %}
                <span class="nav-link">欢迎，{{ session['username'] }}</span>
                <a href="/profile?user_id=1" class="nav-link">个人中心</a>
                <a href="/upload" class="nav-link">上传头像</a>
                <a href="/logout" class="nav-link">退出</a>
            {% else %}
                <a href="/login" class="nav-link">登录</a>
                <a href="/register" class="nav-link">注册</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
