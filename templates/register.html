{% extends "base.html" %}
{% block title %}注册 - 用户管理系统{% endblock %}
{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
        <h2>创建账号</h2>
        <p class="login-subtitle">注册一个新账号开始使用</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" class="form">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="login-input-group">
                    <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
                    <svg class="login-input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/>
                    </svg>
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="login-input-group">
                    <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
                    <svg class="login-input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                </div>
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <div class="login-input-group">
                    <input type="email" id="email" name="email" class="form-input" placeholder="请输入邮箱">
                    <svg class="login-input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <div class="login-input-group">
                    <input type="text" id="phone" name="phone" class="form-input" placeholder="请输入手机号">
                    <svg class="login-input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                    </svg>
                </div>
            </div>
            <button type="submit" class="login-btn">注 册</button>
        </form>

        <div class="login-footer">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>
</div>
{% endblock %}
