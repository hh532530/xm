{% extends "base.html" %}
{% block title %}登录 - 用户管理系统{% endblock %}
{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/>
            </svg>
        </div>
        <h2>欢迎回来</h2>
        <p class="login-subtitle">请输入您的账号信息登录</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="post" class="form">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="login-input-group">
                    <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
                    <svg class="login-input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z"/>
                    </svg>
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="login-input-group">
                    <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
                    <svg class="login-input-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
                    </svg>
                </div>
            </div>
            <button type="submit" class="login-btn">登 录</button>
        </form>

        <div class="login-footer">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
